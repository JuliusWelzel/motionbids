[project]
name = "motion2bids"
version = "0.1.0"
description = "Lightweight converter for motion data to BIDS format"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Julius Welzel", email = "julius.welzel@gmail.com"}
]
dependencies = [
    "bidsschematools>=0.8.0",
    "dataclasses-json>=0.6.0",
    "ipykernel>=6.29.5",
    "numpy>=1.20.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["motion2bids"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
